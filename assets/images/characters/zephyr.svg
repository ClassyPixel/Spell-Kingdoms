  <rect x="106" y="350" width="32" height="84" rx="8" fill="#1a1030"/>
  <ellipse cx="78"  cy="430" rx="22" ry="9" fill="#12082a"/>
  <ellipse cx="122" cy="430" rx="22" ry="9" fill="#12082a"/>
  <!-- cloak main -->
  <path d="M24,152 L176,152 L186,358 L14,358 Z" fill="#1e0f3a"/>
  <path d="M24,152  L58,152  L50,358  L14,358  Z" fill="#120830"/>
  <path d="M142,152 L176,152 L186,358 L150,358 Z" fill="#120830"/>
