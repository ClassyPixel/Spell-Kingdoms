  <path d="M28,88 Q28,38 100,28 Q172,38 172,88 L164,152 L36,152 Z" fill="#1e0f3a"/>
  <path d="M54,104 Q54,54 100,44 Q146,54 146,104 L140,152 L60,152 Z" fill="#120830"/>
  <!-- purple hair emerging from hood -->
  <ellipse cx="100" cy="50" rx="46" ry="30" fill="#5a28b0"/>
  <ellipse cx="56"  cy="76" rx="12" ry="26" fill="#5a28b0"/>
  <ellipse cx="144" cy="76" rx="12" ry="26" fill="#5a28b0"/>
  <path d="M64,38 Q100,24 136,38" stroke="#7a48d0" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- hood shadow fade on upper face -->
  <path d="M54,72 Q54,50 100,42 Q146,50 146,72 L142,90 Q118,74 100,72 Q82,74 58,90 Z" fill="#120830" fill-opacity="0.8"/>
