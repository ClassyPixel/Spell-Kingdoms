<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conjuring Masters — Story Editor</title>
  <style>
    :root {
      --bg:      #0d0d1a;
      --bg2:     #13132a;
      --panel:   #1a1a35;
      --border:  #2a2a55;
      --accent:  #7c5cbf;
      --accent2: #a07de0;
      --gold:    #e0b84a;
      --text:    #d8d8f0;
      --dim:     #8888aa;
      --success: #4ab87c;
      --danger:  #c04a4a;
      --warn:    #d4902a;
      --r:       8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      height: 54px; padding: 0 20px;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 10;
    }
    #topbar h1 { font-size: 1.05em; color: var(--accent2); white-space: nowrap; }
    #topbar .sep { color: var(--border); }
    #topbar .sub { font-size: 0.78em; color: var(--dim); }
    .spacer { flex: 1; }
    #unsaved-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); display: none; flex-shrink: 0;
    }
    #unsaved-dot.on { display: block; }
    #status {
      font-size: 0.8em; padding: 4px 12px; border-radius: var(--r);
      opacity: 0; transition: opacity 0.3s;
    }
    #status.show { opacity: 1; }
    #status.ok   { background: rgba(74,184,124,0.15); border: 1px solid var(--success); color: var(--success); }
    #status.warn { background: rgba(212,144,42,0.15);  border: 1px solid var(--warn);    color: var(--warn); }
    .btn {
      padding: 7px 16px; border-radius: var(--r); border: none;
      cursor: pointer; font-size: 0.88em; font-weight: 600; white-space: nowrap;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn-save   { background: var(--accent); color: #fff; }
    .btn-reset  { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .btn-reset:hover  { border-color: var(--danger); color: var(--danger); filter: none; }
    .btn-export   { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .btn-refresh  { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .btn-refresh:hover { border-color: var(--accent2); color: var(--accent2); filter: none; }

    /* ── Disabled node ───────────────────────────────────── */
    .node-disabled .card-hdr-title { text-decoration: line-through; color: var(--dim); }
    .node-disabled .card-hdr-label { opacity: 0.45; }
    .node-disabled .card-body      { opacity: 0.45; pointer-events: none; }
    .node-disabled-toggle {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72em; color: var(--dim); cursor: pointer;
      padding: 2px 8px; border-radius: 4px; border: 1px solid transparent;
      user-select: none; flex-shrink: 0; transition: border-color 0.15s, color 0.15s;
    }
    .node-disabled-toggle:hover { border-color: var(--border); color: var(--text); }
    .node-disabled-toggle input  { cursor: pointer; accent-color: var(--warn); }
    .node-disabled .node-disabled-toggle { color: var(--warn); border-color: rgba(212,144,42,0.4); pointer-events: all; }

    /* ── Choice result selector ──────────────────────────── */
    .choice-result { display: flex; gap: 3px; flex-shrink: 0; }
    .result-btn {
      font-size: 0.68em; padding: 2px 7px; border-radius: 4px;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); cursor: pointer; transition: all 0.15s; font-weight: 600;
    }
    .result-btn.pos.active { background: rgba(74,184,124,0.18); border-color: var(--success); color: var(--success); }
    .result-btn.neu.active { background: rgba(136,136,170,0.15); border-color: var(--dim);     color: var(--text); }
    .result-btn.neg.active { background: rgba(192,74,74,0.18);   border-color: var(--danger);  color: var(--danger); }
    .result-btn:not(.active):hover { border-color: var(--accent); color: var(--accent2); }

    /* ── Remove choice button ────────────────────────────── */
    .choice-remove {
      background: transparent; border: none; color: var(--dim);
      cursor: pointer; font-size: 1.1em; padding: 0 4px; flex-shrink: 0;
      line-height: 1; transition: color 0.15s;
    }
    .choice-remove:hover { color: var(--danger); }

    /* ── Add choice button ───────────────────────────────── */
    .choice-add {
      width: 100%; margin-top: 6px; padding: 7px;
      background: transparent; border: 1px dashed var(--border);
      border-radius: var(--r); color: var(--dim);
      cursor: pointer; font-size: 0.82em; transition: all 0.15s;
    }
    .choice-add:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── Layout ──────────────────────────────────────────── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 230px; background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }

    /* Section block */
    .section { border-bottom: 1px solid var(--border); }

    .section-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; cursor: pointer; user-select: none;
      background: var(--bg2); transition: background 0.15s;
    }
    .section-hdr:hover { background: var(--panel); }

    .section-arrow {
      font-size: 0.65em; color: var(--dim); width: 10px;
      transition: transform 0.2s; display: inline-block;
    }
    .section.collapsed .section-arrow { transform: rotate(-90deg); }

    .section-icon { font-size: 1em; }
    .section-label { font-size: 0.88em; font-weight: 600; flex: 1; }
    .section-badge {
      font-size: 0.65em; background: rgba(224,184,74,0.18);
      color: var(--gold); border-radius: 10px; padding: 1px 6px;
      display: none;
    }
    .section-badge.on { display: inline; }

    /* Items inside a section */
    .section-items { display: flex; flex-direction: column; }
    .section.collapsed .section-items { display: none; }

    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px 9px 28px; cursor: pointer;
      font-size: 0.84em; border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      color: var(--dim);
    }
    .sidebar-item:hover { background: var(--panel); color: var(--text); }
    .sidebar-item.active {
      border-left-color: var(--accent2); background: var(--panel);
      color: var(--accent2); font-weight: 600;
    }
    .sidebar-item.modified { color: var(--text); }
    .sidebar-item.modified .item-dot { display: block; }
    .sidebar-item.active.modified { color: var(--accent2); }

    .item-icon { font-size: 1em; width: 18px; text-align: center; flex-shrink: 0; }
    .item-label { flex: 1; line-height: 1.3; }
    .item-sublabel { font-size: 0.72em; color: var(--dim); display: block; }
    .item-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); display: none; flex-shrink: 0;
    }

    /* ── Right panel ─────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #panel-header {
      padding: 14px 22px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
    }
    #panel-header .ph-icon  { font-size: 2em; }
    #panel-header .ph-title { font-size: 1.15em; font-weight: 700; color: var(--accent2); }
    #panel-header .ph-sub   { font-size: 0.78em; color: var(--dim); margin-top: 2px; }

    #panel-search {
      padding: 8px 22px; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0; display: none;
    }
    #panel-search.visible { display: block; }
    #search-input {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); font-size: 0.82em;
      padding: 6px 10px; outline: none;
    }
    #search-input:focus { border-color: var(--accent); }

    #panel-body { flex: 1; overflow-y: auto; padding: 18px 22px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 10px;
      color: var(--dim); text-align: center; padding: 40px;
    }
    .empty-state .es-icon { font-size: 3em; opacity: 0.4; }
    .empty-state p { font-size: 0.9em; max-width: 280px; line-height: 1.6; }

    /* ── Field cards ─────────────────────────────────────── */
    .edit-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 14px; overflow: hidden;
      transition: border-color 0.2s;
    }
    .edit-card.modified { border-color: var(--gold); }

    .card-hdr {
      background: var(--bg2); padding: 9px 14px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .card-hdr-label { font-size: 0.72em; font-family: monospace; color: var(--accent); background: rgba(124,92,191,0.15); padding: 2px 8px; border-radius: 4px; }
    .card-hdr-title { font-size: 0.88em; color: var(--text); flex: 1; }
    .card-hdr-badge { font-size: 0.68em; color: var(--gold); background: rgba(224,184,74,0.12); padding: 1px 7px; border-radius: 4px; display: none; }
    .edit-card.modified .card-hdr-badge { display: inline; }
    .card-toggle { color: var(--dim); font-size: 0.7em; margin-left: auto; transition: transform 0.2s; }
    .edit-card.collapsed .card-toggle { transform: rotate(-90deg); }
    .edit-card.collapsed .card-body { display: none; }

    .card-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    /* Field rows inside a card */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-lbl {
      font-size: 0.7em; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--dim);
    }
    .field-input, .field-ta {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); font-family: inherit;
      font-size: 0.88em; padding: 8px 11px; outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .field-input:focus, .field-ta:focus { border-color: var(--accent); }
    .field-input.changed, .field-ta.changed { border-color: var(--gold); }
    .field-ta { resize: vertical; min-height: 80px; line-height: 1.65; }
    .field-ta.tall { min-height: 130px; }

    /* Choices */
    .choices-lbl { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 4px; }
    .choice-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r); padding: 7px 11px;
    }
    .choice-num  { font-size: 0.72em; color: var(--dim); width: 18px; flex-shrink: 0; }
    .choice-inp  { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 0.86em; outline: none; }
    .choice-inp.changed { color: var(--gold); }
    .choice-tag  { font-size: 0.7em; color: var(--dim); flex-shrink: 0; }

    /* Quest objectives */
    .obj-row {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 8px;
    }
    .obj-id { font-size: 0.68em; font-family: monospace; color: var(--dim); }
    .obj-type { font-size: 0.72em; color: var(--accent2); }

    /* Read-only reward badges */
    .reward-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .reward-badge {
      font-size: 0.75em; padding: 3px 10px; border-radius: 10px;
      background: rgba(74,184,124,0.12); border: 1px solid rgba(74,184,124,0.3);
      color: var(--success);
    }

    /* Section top-level divider labels */
    .section-divider {
      font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--dim); padding: 14px 0 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── Tab bar ─────────────────────────────────────────── */
    #tab-bar {
      background: var(--bg2); border-bottom: 2px solid var(--border);
      display: flex; align-items: flex-end; gap: 2px;
      padding: 0 20px; height: 38px; flex-shrink: 0;
    }
    .tab-btn {
      padding: 6px 20px; border-radius: 6px 6px 0 0;
      border: 1px solid transparent; border-bottom: none;
      background: transparent; color: var(--dim); cursor: pointer;
      font-size: 0.88em; font-weight: 600; transition: all 0.15s;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--text); background: var(--panel); }
    .tab-btn.active { color: var(--accent2); background: var(--panel); border-color: var(--border); border-bottom-color: var(--panel); }

    /* ── Tab panels ──────────────────────────────────────── */
    .tab-panel { display: none; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Map layout ──────────────────────────────────────── */
    #map-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }

    /* ── Map sidebar ─────────────────────────────────────── */
    #map-sidebar {
      width: 240px; flex-shrink: 0; background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #map-sidebar-hdr {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--dim); flex-shrink: 0;
    }
    #map-loc-list { flex: 1; overflow-y: auto; }
    .map-loc-item { border-bottom: 1px solid var(--border); }
    .map-loc-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
      transition: background 0.12s;
    }
    .map-loc-hdr:hover { background: var(--panel); }
    .map-loc-icon { font-size: 1.1em; flex-shrink: 0; }
    .map-loc-name { flex: 1; font-size: 0.88em; font-weight: 600; }
    .map-loc-tag {
      font-size: 0.68em; color: var(--dim);
      background: rgba(124,92,191,0.12); padding: 1px 6px;
      border-radius: 4px; flex-shrink: 0;
    }
    .map-loc-arrow { font-size: 0.65em; color: var(--dim); transition: transform 0.2s; flex-shrink: 0; }
    .map-loc-item.collapsed .map-loc-arrow { transform: rotate(-90deg); }
    .map-loc-item.collapsed .map-areas { display: none; }
    .map-area-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px 8px 30px; cursor: pointer;
      font-size: 0.82em; color: var(--dim);
      border-left: 3px solid transparent; transition: all 0.12s;
    }
    .map-area-item:hover { background: var(--panel); color: var(--text); }
    .map-area-item.active { border-left-color: var(--accent2); background: var(--panel); color: var(--accent2); font-weight: 600; }

    /* ── Map main ────────────────────────────────────────── */
    #map-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    #map-area-hdr {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
      display: none; align-items: center; gap: 12px;
    }
    #map-area-hdr.visible { display: flex; }
    .map-ah-icon { font-size: 1.8em; flex-shrink: 0; }
    .map-ah-title { font-size: 1.1em; font-weight: 700; color: var(--accent2); }
    .map-ah-sub { font-size: 0.77em; color: var(--dim); margin-top: 2px; }
    .map-ah-save {
      margin-left: auto; padding: 7px 16px; border-radius: var(--r);
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; font-size: 0.88em; font-weight: 600;
      transition: filter 0.15s; white-space: nowrap;
    }
    .map-ah-save:hover { filter: brightness(1.15); }
    #map-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Object list panel ───────────────────────────────── */
    #map-obj-list {
      width: 300px; flex-shrink: 0; overflow-y: auto;
      padding: 12px; border-right: 1px solid var(--border);
    }
    .obj-group { margin-bottom: 16px; }
    .obj-group-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 2px; margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .obj-group-title { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); flex: 1; }
    .obj-group-count { font-size: 0.7em; color: var(--gold); background: rgba(224,184,74,0.12); padding: 1px 6px; border-radius: 4px; }
    .obj-group-add {
      font-size: 0.74em; padding: 2px 8px; border-radius: 4px;
      border: 1px dashed var(--border); background: transparent;
      color: var(--dim); cursor: pointer; transition: all 0.15s;
    }
    .obj-group-add:hover { border-color: var(--accent); color: var(--accent2); }
    .obj-group-empty { font-size: 0.76em; color: var(--dim); padding: 4px 2px; font-style: italic; }
    .map-obj-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 6px; overflow: hidden;
    }
    .map-obj-card.selected { border-color: var(--accent2); }
    .map-obj-card-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; cursor: pointer; background: var(--bg2); user-select: none;
    }
    .map-obj-card-hdr:hover { background: rgba(42,42,85,0.6); }
    .map-obj-icon { font-size: 1.1em; width: 24px; text-align: center; flex-shrink: 0; }
    .map-obj-name { flex: 1; font-size: 0.84em; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .map-obj-pos { font-size: 0.68em; color: var(--dim); flex-shrink: 0; }
    .map-obj-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .map-obj-btn {
      width: 22px; height: 22px; border-radius: 4px; border: none;
      background: transparent; color: var(--dim); cursor: pointer;
      font-size: 0.85em; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .map-obj-btn.dup:hover { background: rgba(124,92,191,0.2); color: var(--accent2); }
    .map-obj-btn.rem:hover { background: rgba(192,74,74,0.2); color: var(--danger); }
    .map-obj-body {
      padding: 10px; display: flex; flex-direction: column; gap: 6px;
      border-top: 1px solid var(--border);
    }
    .map-obj-card.collapsed .map-obj-body { display: none; }
    .mf-row { display: flex; gap: 8px; align-items: center; }
    .mf-lbl { font-size: 0.68em; text-transform: uppercase; letter-spacing: 0.07em; color: var(--dim); width: 64px; flex-shrink: 0; }
    .mf-inp {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-family: inherit;
      font-size: 0.83em; padding: 5px 8px; outline: none; transition: border-color 0.15s;
    }
    .mf-inp:focus { border-color: var(--accent); }
    .mf-arrows { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .mf-arrow {
      width: 20px; height: 16px; border-radius: 3px;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); cursor: pointer; font-size: 0.6em; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: all 0.1s; padding: 0;
    }
    .mf-arrow:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,191,0.12); }
    .mf-arrow:active { background: rgba(124,92,191,0.25); }

    /* ── Preview panel ───────────────────────────────────── */
    #map-preview-panel {
      flex: 1; min-width: 0; display: flex;
      flex-direction: column; overflow: hidden; padding: 14px; background: var(--bg);
    }
    .map-preview-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
    #map-preview {
      position: relative;
      background: linear-gradient(135deg, var(--panel) 0%, var(--bg2) 100%);
      border: 1px solid var(--border); border-radius: var(--r);
      overflow: hidden; user-select: none;
    }
    .preview-bg-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 8em; opacity: 0.06; pointer-events: none; user-select: none;
    }
    /* Token: icon+label stack above the anchor dot.
       bottom: Y% places the DOT (last flex child) at Y% from container bottom.
       translateX(-50%) centers horizontally at left: X%.
       The dot = exact coordinate = lower-center of the in-game sprite. */
    .map-token {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      transform: translateX(-50%); cursor: grab; z-index: 10; gap: 1px;
    }
    .map-token:hover { z-index: 20; }
    .map-token:hover .map-token-icon { border-color: var(--accent); }
    /* Dragging: hide icon + label, show only the dot */
    .map-token.dragging { cursor: grabbing !important; z-index: 100; }
    .map-token.dragging .map-token-icon { display: none; }
    .map-token.dragging .map-token-lbl  { display: none; }
    .map-token.dragging .map-token-dot  {
      width: 10px; height: 10px;
      background: var(--accent2);
      box-shadow: 0 0 0 4px rgba(160,125,224,0.3), 0 0 14px rgba(160,125,224,0.6);
    }

    .map-token.selected .map-token-dot  { background: var(--accent2); opacity: 1; }
    .map-token-icon {

      padding: 1px 5px; border-radius: 3px; white-space: nowrap;
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
    }
    /* Anchor dot — sits at the exact coordinate (lower-center of the in-game sprite) */
    .map-token-dot {

    /* ── Voice-to-text ───────────────────────────────────── */
    .field-ctrl { position: relative; width: 100%; }
    .field-ctrl .field-input,
    .field-ctrl .field-ta { padding-right: 32px; }
    .voice-btn {
      position: absolute; top: 6px; right: 6px;

      transition: all 0.15s; z-index: 2; padding: 0; flex-shrink: 0;

    .voice-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .voice-btn.listening {
      border-color: #c04a4a; color: #e07070;
      background: rgba(192,74,74,0.12);
      animation: voice-pulse 1s ease-in-out infinite;
    }
    .field-ctrl .field-ta ~ .voice-btn { top: 6px; }
    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,74,74,0.4); }
      50%       { box-shadow: 0 0 0 4px rgba(192,74,74,0); }

    /* ── Preview overlays ────────────────────────────────── */
    .preview-sidebar-guide {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 12%;          /* ≈ 230 / 1920 × 100 */
      background: rgba(0,0,0,0.38);
      border-right: 1px dashed rgba(160,125,224,0.4);
      pointer-events: none; z-index: 5;
    }
    .preview-sidebar-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(-90deg);
      font-size: 0.52em; color: rgba(160,125,224,0.7);

      background: rgba(0,0,0,0.38);
      border-bottom: 1px dashed rgba(160,125,224,0.4);

    }
  </style>

<script type="module">
import { CHAPTERS, DIALOGUES, QUESTS, LOCATIONS, NPCS } from './js/Data.js';

// ─────────────────────────────────────────────────────────────────
// Voice-to-Text (Chrome webkitSpeechRecognition)
// ─────────────────────────────────────────────────────────────────
const VoiceInput = (() => {
  const supported = 'webkitSpeechRecognition' in window;
  let _current = null;

  function attach(inputEl, btn) {
    if (!supported) { btn.style.display = 'none'; return; }
    btn.title = 'Click to dictate';
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (_current) {
        _current.stop();
        _current = null;
        btn.classList.remove('listening');
        return;
      }
      const rec = new webkitSpeechRecognition();
      rec.lang = 'en-US';
      rec.interimResults = false;
      rec.continuous = false;
      _current = rec;
      btn.classList.add('listening');

      rec.onresult = (ev) => {
        const transcript = ev.results[0][0].transcript;
        const v = inputEl.value;
        inputEl.value = v ? v + ' ' + transcript : transcript;
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
      };
      rec.onerror = () => { _current = null; btn.classList.remove('listening'); };
      rec.onend  = () => { _current = null; btn.classList.remove('listening'); };
      rec.start();
    });
  }

  function wrap(inputEl) {
    const ctrl = document.createElement('div');
    ctrl.className = 'field-ctrl';
    inputEl.parentNode?.insertBefore(ctrl, inputEl);
    ctrl.appendChild(inputEl);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'voice-btn';
    btn.textContent = '🎤';
    ctrl.appendChild(btn);
    attach(inputEl, btn);
    return ctrl;
  }

  return { attach, wrap, supported };
})();

// ─────────────────────────────────────────────────────────────────
// Keys & state
// ─────────────────────────────────────────────────────────────────
const KEYS = {
  story:   'sca_story_overrides',
  npc:     'sca_dialogue_overrides',
  quests:  'sca_quest_overrides',
};

const NPC_META = {
  aria:           { label: 'Aria',           icon: '🧙‍♀️', sub: 'Fire mage, 2nd year' },
  master_aldric:  { label: 'Master Aldric',  icon: '🧓',  sub: 'Arcane Theory professor' },
  zephyr:         { label: 'Zephyr',         icon: '🧝',  sub: 'Mysterious merchant' },
  training_dummy: { label: 'Training Dummy', icon: '🪆',  sub: 'Dueling practice construct' },
};

const QUEST_ICONS = { main: '⭐', side: '✦' };

// Working copies (deep clones of source data + merged overrides)
const wk = {
  chapters:  {},   // { chapterId: chapter }
  dialogues: {},   // { npcId: dialogue }
  quests:    {},   // { questId: quest }
};

// Dirty tracking: Set of "type:id:subkey" strings
const dirty = { story: new Set(), npc: new Set(), quests: new Set() };

// Current view
let activeKey = null;  // e.g. "story:chapter_1", "npc:aria", "quests:main_01"

// ─────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────
function init() {
  // Deep-clone source data
  CHAPTERS.forEach(ch => { wk.chapters[ch.chapterId] = JSON.parse(JSON.stringify(ch)); });
  Object.entries(DIALOGUES).forEach(([id, d]) => { wk.dialogues[id] = JSON.parse(JSON.stringify(d)); });
  QUESTS.forEach(q => { wk.quests[q.questId] = JSON.parse(JSON.stringify(q)); });

  // Apply saved overrides
  mergeStoryOverrides(loadRaw(KEYS.story));
  mergeNpcOverrides(loadRaw(KEYS.npc));
  mergeQuestOverrides(loadRaw(KEYS.quests));

  buildSidebar();
  bindTopbar();
  mapInit();
}

// ─────────────────────────────────────────────────────────────────
// Override merging (from localStorage → working copies)
// ─────────────────────────────────────────────────────────────────
function mergeStoryOverrides(saved) {
  if (!saved) return;
  Object.entries(saved).forEach(([chapterId, ov]) => {
    const ch = wk.chapters[chapterId];
    if (!ch) return;
    if (ov.title    !== undefined) { ch.title    = ov.title;    dirty.story.add(`${chapterId}:title`); }
    if (ov.subtitle !== undefined) { ch.subtitle = ov.subtitle; dirty.story.add(`${chapterId}:subtitle`); }
    if (ov.intro    !== undefined) { ch.intro    = ov.intro;    dirty.story.add(`${chapterId}:intro`); }
    Object.entries(ov.scenes ?? {}).forEach(([sceneId, sv]) => {
      const scene = ch.scenes?.find(s => s.sceneId === sceneId);
      if (!scene) return;
      if (sv.title !== undefined) { scene.title = sv.title; dirty.story.add(`${chapterId}:scene:${sceneId}:title`); }
      if (sv.text  !== undefined) { scene.text  = sv.text;  dirty.story.add(`${chapterId}:scene:${sceneId}:text`); }
    });
  });
}

function mergeNpcOverrides(saved) {
  if (!saved) return;
  Object.entries(saved).forEach(([npcId, ov]) => {
    const dlg = wk.dialogues[npcId];
    if (!dlg) return;
    Object.entries(ov.nodes ?? {}).forEach(([nodeId, nv]) => {
      const node = dlg.nodes[nodeId];
      if (!node) return;
      if (nv.speaker  !== undefined) { node.speaker  = nv.speaker;  dirty.npc.add(`${npcId}::${nodeId}`); }
      if (nv.text     !== undefined) { node.text     = nv.text;     dirty.npc.add(`${npcId}::${nodeId}`); }
      if (nv.disabled !== undefined) { node.disabled = nv.disabled; dirty.npc.add(`${npcId}::${nodeId}`); }
      if (nv.choices  !== undefined) {
        // Full replacement — includes added/removed choices and result tags
        node.choices = JSON.parse(JSON.stringify(nv.choices));
        dirty.npc.add(`${npcId}::${nodeId}`);
      }
    });
  });
}

function mergeQuestOverrides(saved) {
  if (!saved) return;
  Object.entries(saved).forEach(([questId, ov]) => {
    const q = wk.quests[questId];
    if (!q) return;
    if (ov.title       !== undefined) { q.title       = ov.title;       dirty.quests.add(`${questId}:title`); }
    if (ov.description !== undefined) { q.description = ov.description; dirty.quests.add(`${questId}:description`); }
    Object.entries(ov.objectives ?? {}).forEach(([objId, ov2]) => {
      const obj = q.objectives?.find(o => o.id === objId);
      if (obj && ov2.description !== undefined) { obj.description = ov2.description; dirty.quests.add(`${questId}:obj:${objId}`); }
    });
  });
}

// ─────────────────────────────────────────────────────────────────
// Sidebar
// ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  // Story items (chapters)
  const storyList = document.getElementById('items-story');
  storyList.innerHTML = '';
  Object.values(wk.chapters).forEach(ch => {
    storyList.appendChild(makeSidebarItem({
      key:   `story:${ch.chapterId}`,
      icon:  '📄',
      label: `Ch. ${ch.number}: ${ch.title}`,
      sub:   ch.subtitle,
      type:  'story',
      id:    ch.chapterId,
    }));
  });

  // NPC items
  const npcList = document.getElementById('items-npc');
  npcList.innerHTML = '';
  Object.keys(wk.dialogues).forEach(npcId => {
    const meta = NPC_META[npcId] ?? { label: npcId, icon: '🧙', sub: '' };
    npcList.appendChild(makeSidebarItem({
      key:   `npc:${npcId}`,
      icon:  meta.icon,
      label: meta.label,
      sub:   meta.sub,
      type:  'npc',
      id:    npcId,
    }));
  });

  // Quest items
  const questList = document.getElementById('items-quests');
  questList.innerHTML = '';
  Object.values(wk.quests).forEach(q => {
    questList.appendChild(makeSidebarItem({
      key:   `quests:${q.questId}`,
      icon:  QUEST_ICONS[q.type] ?? '✦',
      label: q.title,
      sub:   q.type === 'main' ? 'Main Quest' : 'Side Quest',
      type:  'quests',
      id:    q.questId,
    }));
  });

  // Section collapse toggles
  document.querySelectorAll('.section-hdr').forEach(hdr => {
    hdr.addEventListener('click', () => {
      hdr.closest('.section').classList.toggle('collapsed');
    });
  });

  refreshSidebarState();
}

function makeSidebarItem({ key, icon, label, sub, type, id }) {
  const el = document.createElement('div');
  el.className = 'sidebar-item';
  el.dataset.key = key;
  el.innerHTML = `
    <span class="item-icon">${icon}</span>
    <span class="item-label">
      ${label}
      ${sub ? `<span class="item-sublabel">${sub}</span>` : ''}
    </span>
    <span class="item-dot"></span>
  `;
  el.addEventListener('click', () => selectItem(key, type, id));
  return el;
}

function refreshSidebarState() {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const key = el.dataset.key;
    const [type, id] = key.split(':');

    const isModified = [...dirty[type]].some(d => d.startsWith(id));
    el.classList.toggle('modified', isModified);
    el.classList.toggle('active', key === activeKey);
  });

  // Section badges
  document.getElementById('badge-story').classList.toggle('on',  dirty.story.size  > 0);
  document.getElementById('badge-npc').classList.toggle('on',    dirty.npc.size    > 0);
  document.getElementById('badge-quests').classList.toggle('on', dirty.quests.size > 0);

  // Unsaved dot
  const anyDirty = dirty.story.size > 0 || dirty.npc.size > 0 || dirty.quests.size > 0;
  document.getElementById('unsaved-dot').classList.toggle('on', anyDirty);
}

// ─────────────────────────────────────────────────────────────────
// Item selection → right panel
// ─────────────────────────────────────────────────────────────────
function selectItem(key, type, id) {
  activeKey = key;
  refreshSidebarState();

  const search = document.getElementById('panel-search');
  const searchInp = document.getElementById('search-input');
  searchInp.value = '';

  if (type === 'story') {
    const ch = wk.chapters[id];
    const meta = NPC_META[id];
    setPanelHeader('📖', `Chapter ${ch.number}: ${ch.title}`, ch.subtitle);
    search.classList.add('visible');
    renderChapter(id);
  } else if (type === 'npc') {
    const meta = NPC_META[id] ?? { label: id, icon: '🧙', sub: '' };
    const nodeCount = Object.keys(wk.dialogues[id]?.nodes ?? {}).length;
    setPanelHeader(meta.icon, meta.label, `${nodeCount} dialogue nodes · ${meta.sub}`);
    search.classList.add('visible');
    renderNpc(id);
  } else if (type === 'quests') {
    const q = wk.quests[id];
    const icon = QUEST_ICONS[q.type] ?? '✦';
    setPanelHeader(icon, q.title, q.type === 'main' ? 'Main Quest' : 'Side Quest');
    search.classList.remove('visible');
    renderQuest(id);
  }
}

function setPanelHeader(icon, title, sub) {
  const hdr = document.getElementById('panel-header');
  hdr.style.display = 'flex';
  document.getElementById('ph-icon').textContent  = icon;
  document.getElementById('ph-title').textContent = title;
  document.getElementById('ph-sub').textContent   = sub;
}

// ─────────────────────────────────────────────────────────────────
// Render: Chapter
// ─────────────────────────────────────────────────────────────────
function renderChapter(chapterId) {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';
  const ch = wk.chapters[chapterId];
  const q  = document.getElementById('search-input').value.toLowerCase();

  // Chapter meta card
  const metaCard = makeEditCard({
    label: 'chapter',
    title: 'Chapter Header',
    isDirty: dirty.story.has(`${chapterId}:title`) || dirty.story.has(`${chapterId}:subtitle`),
  });
  const mb = metaCard.querySelector('.card-body');

  mb.appendChild(makeField({
    label: 'Chapter Title', value: ch.title, multiline: false,
    onChange(v) {
      wk.chapters[chapterId].title = v;
      markDirty('story', `${chapterId}:title`, metaCard);
      // Update sidebar label
      refreshSidebarState();
      document.querySelector(`[data-key="story:${chapterId}"] .item-label`)
        .firstChild.textContent = `Ch. ${ch.number}: ${v}`;
    },
  }));
  mb.appendChild(makeField({
    label: 'Subtitle', value: ch.subtitle, multiline: false,
    onChange(v) {
      wk.chapters[chapterId].subtitle = v;
      markDirty('story', `${chapterId}:subtitle`, metaCard);
    },
  }));

  if (!q || 'chapter header'.includes(q) || ch.title.toLowerCase().includes(q)) {
    body.appendChild(metaCard);
  }

  // Intro card
  const introCard = makeEditCard({
    label: 'intro',
    title: 'Chapter Introduction',
    isDirty: dirty.story.has(`${chapterId}:intro`),
  });
  const ib = introCard.querySelector('.card-body');
  ib.appendChild(makeField({
    label: 'Intro Narration', value: ch.intro, multiline: true, tall: true,
    onChange(v) {
      wk.chapters[chapterId].intro = v;
      markDirty('story', `${chapterId}:intro`, introCard);
    },
  }));

  if (!q || 'introduction narration'.includes(q) || ch.intro.toLowerCase().includes(q)) {
    body.appendChild(introCard);
  }

  // Scene cards
  if (ch.scenes?.length) {
    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.textContent = `Scenes (${ch.scenes.length})`;
    body.appendChild(divider);

    ch.scenes.forEach(scene => {
      const dkTitle = `${chapterId}:scene:${scene.sceneId}:title`;
      const dkText  = `${chapterId}:scene:${scene.sceneId}:text`;
      const isDirty = dirty.story.has(dkTitle) || dirty.story.has(dkText);

      // Filter by search
      if (q && !scene.title.toLowerCase().includes(q) && !scene.text.toLowerCase().includes(q) && !scene.sceneId.includes(q)) return;

      const card = makeEditCard({ label: scene.sceneId, title: scene.title, isDirty });
      const cb = card.querySelector('.card-body');

      cb.appendChild(makeField({
        label: 'Scene Title', value: scene.title, multiline: false,
        onChange(v) {
          scene.title = v;
          markDirty('story', dkTitle, card);
          card.querySelector('.card-hdr-title').textContent = v;
        },
      }));
      cb.appendChild(makeField({
        label: 'Scene Text', value: scene.text, multiline: true, tall: true,
        onChange(v) {
          scene.text = v;
          markDirty('story', dkText, card);
        },
      }));

      body.appendChild(card);
    });
  }

  if (!body.children.length) {
    body.innerHTML = '<div class="empty-state"><div class="es-icon">🔍</div><p>No results match your search.</p></div>';
  }
}

// ─────────────────────────────────────────────────────────────────
// Render: NPC Dialogue
// ─────────────────────────────────────────────────────────────────
function renderNpc(npcId) {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';
  const dlg = wk.dialogues[npcId];
  const q   = document.getElementById('search-input').value.toLowerCase();
  let count = 0;

  Object.entries(dlg.nodes).forEach(([nodeId, node]) => {
    const dk = `${npcId}::${nodeId}`;
    const isDirty = dirty.npc.has(dk);

    if (q) {
      const hit = nodeId.includes(q) ||
                  (node.text ?? '').toLowerCase().includes(q) ||
                  (node.speaker ?? '').toLowerCase().includes(q) ||
                  (node.choices ?? []).some(c => c.label.toLowerCase().includes(q));
      if (!hit) return;
    }

    const card = makeEditCard({ label: nodeId, title: node.speaker ?? nodeId, isDirty });
    const cb = card.querySelector('.card-body');

    // ── Disabled toggle (in card header) ──────────────────
    const hdr = card.querySelector('.card-hdr');
    const disabledToggle = document.createElement('label');
    disabledToggle.className = 'node-disabled-toggle';
    disabledToggle.title = 'When checked, this dialogue node is skipped in-game';
    disabledToggle.addEventListener('click', e => e.stopPropagation());
    const disabledCb = document.createElement('input');
    disabledCb.type = 'checkbox';
    disabledCb.checked = !!(node.disabled);
    if (node.disabled) card.classList.add('node-disabled');
    disabledCb.addEventListener('change', () => {
      wk.dialogues[npcId].nodes[nodeId].disabled = disabledCb.checked;
      card.classList.toggle('node-disabled', disabledCb.checked);
      markDirty('npc', dk, card);
    });
    disabledToggle.appendChild(disabledCb);
    disabledToggle.append('\u00a0Skip');
    hdr.insertBefore(disabledToggle, hdr.querySelector('.card-toggle'));

    cb.appendChild(makeField({
      label: 'Speaker Name', value: node.speaker ?? '', multiline: false,
      onChange(v) {
        wk.dialogues[npcId].nodes[nodeId].speaker = v;
        markDirty('npc', dk, card);
        card.querySelector('.card-hdr-title').textContent = v || nodeId;
      },
    }));
    cb.appendChild(makeField({
      label: 'Dialogue Text', value: node.text ?? '', multiline: true,
      onChange(v) { wk.dialogues[npcId].nodes[nodeId].text = v; markDirty('npc', dk, card); },
    }));

    // ── Choices section (always rendered) ─────────────────
    const choicesWrap = document.createElement('div');
    const choicesHdr  = document.createElement('div');
    choicesHdr.className = 'choices-lbl';

    function updateChoicesLabel() {
      const n = wk.dialogues[npcId].nodes[nodeId].choices?.length ?? 0;
      choicesHdr.textContent = `Player Choices (${n})`;
    }

    function makeResultSelector(choice, idx) {
      const wrap = document.createElement('div');
      wrap.className = 'choice-result';
      const current = choice.result ?? 'neutral';
      [['pos','▲','positive'],['neu','●','neutral'],['neg','▼','negative']].forEach(([cls, sym, val]) => {
        const btn = document.createElement('button');
        btn.className = `result-btn ${cls}${current === val ? ' active' : ''}`;
        btn.textContent = sym;
        btn.title = val.charAt(0).toUpperCase() + val.slice(1);
        btn.addEventListener('click', () => {
          wk.dialogues[npcId].nodes[nodeId].choices[idx].result = val;
          wrap.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          markDirty('npc', dk, card);
        });
        wrap.appendChild(btn);
      });
      return wrap;
    }

    function buildChoiceRow(choice, idx) {
      const row = document.createElement('div');
      row.className = 'choice-row';

      const num = document.createElement('span');
      num.className = 'choice-num';
      num.textContent = `${idx + 1}.`;
      row.appendChild(num);

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'choice-inp';
      inp.value = choice.label ?? '';
      inp.placeholder = 'Choice label…';
      inp.addEventListener('input', () => {
        wk.dialogues[npcId].nodes[nodeId].choices[idx].label = inp.value;
        inp.classList.add('changed');
        markDirty('npc', dk, card);
      });
      row.appendChild(inp);

      row.appendChild(makeResultSelector(choice, idx));

      if (choice.requires) {
        const t = document.createElement('span');
        t.className = 'choice-tag'; t.textContent = '🔒';
        t.title = JSON.stringify(choice.requires);
        row.appendChild(t);
      }
      if (choice.effects?.length) {
        const t = document.createElement('span');
        t.className = 'choice-tag';
        t.textContent = `⚡${choice.effects.length}`;
        t.title = choice.effects.map(e => e.type).join(', ');
        row.appendChild(t);
      }

      const removeBtn = document.createElement('button');
      removeBtn.className = 'choice-remove';
      removeBtn.textContent = '×';
      removeBtn.title = 'Remove this choice';
      removeBtn.addEventListener('click', () => {
        wk.dialogues[npcId].nodes[nodeId].choices.splice(idx, 1);
        markDirty('npc', dk, card);
        rebuildChoices();
      });
      row.appendChild(removeBtn);

      return row;
    }

    function rebuildChoices() {
      choicesWrap.replaceChildren(choicesHdr);
      updateChoicesLabel();
      (wk.dialogues[npcId].nodes[nodeId].choices ?? []).forEach((ch, i) => {
        choicesWrap.appendChild(buildChoiceRow(ch, i));
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'choice-add';
      addBtn.textContent = '＋ Add Choice';
      addBtn.addEventListener('click', () => {
        if (!wk.dialogues[npcId].nodes[nodeId].choices) wk.dialogues[npcId].nodes[nodeId].choices = [];
        wk.dialogues[npcId].nodes[nodeId].choices.push({ label: '', result: 'neutral', next: null });
        markDirty('npc', dk, card);
        rebuildChoices();
      });
      choicesWrap.appendChild(addBtn);
    }

    rebuildChoices();
    cb.appendChild(choicesWrap);

    body.appendChild(card);
    count++;
  });

  if (!count) {
    body.innerHTML = '<div class="empty-state"><div class="es-icon">🔍</div><p>No results match your search.</p></div>';
  }
}

function renderQuest(questId) {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';
  const q = wk.quests[questId];

  // Quest meta card
  const metaCard = makeEditCard({
    label: questId,
    title: 'Quest Details',
    isDirty: dirty.quests.has(`${questId}:title`) || dirty.quests.has(`${questId}:description`),
  });
  const mb = metaCard.querySelector('.card-body');

  mb.appendChild(makeField({
    label: 'Quest Title', value: q.title, multiline: false,
    onChange(v) {
      wk.quests[questId].title = v;
      markDirty('quests', `${questId}:title`, metaCard);
      refreshSidebarState();
      const sideItem = document.querySelector(`[data-key="quests:${questId}"] .item-label`);
      if (sideItem) sideItem.firstChild.textContent = v;
    },
  }));
  mb.appendChild(makeField({
    label: 'Quest Description', value: q.description, multiline: true,
    onChange(v) {
      wk.quests[questId].description = v;
      markDirty('quests', `${questId}:description`, metaCard);
    },
  }));

  body.appendChild(metaCard);

  // Objectives card
  if (q.objectives?.length) {
    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.textContent = `Objectives (${q.objectives.length})`;
    body.appendChild(divider);

    q.objectives.forEach(obj => {
      const dk = `${questId}:obj:${obj.id}`;
      const objCard = makeEditCard({ label: obj.id, title: obj.description ?? obj.id, isDirty: dirty.quests.has(dk) });
      const ob = objCard.querySelector('.card-body');

      // Type tag (read-only)
      const typeRow = document.createElement('div');
      typeRow.innerHTML = `<span class="field-lbl">Type</span><span class="obj-type">${obj.type}</span>`;
      ob.appendChild(typeRow);

      ob.appendChild(makeField({
        label: 'Objective Description', value: obj.description ?? '', multiline: false,
        onChange(v) {
          obj.description = v;
          markDirty('quests', dk, objCard);
          objCard.querySelector('.card-hdr-title').textContent = v || obj.id;
        },
      }));

      body.appendChild(objCard);
    });
  }

  // Rewards (read-only display)
  if (q.rewards) {
    const divider2 = document.createElement('div');
    divider2.className = 'section-divider';
    divider2.textContent = 'Rewards (read-only)';
    body.appendChild(divider2);

    const rewardCard = document.createElement('div');
    rewardCard.className = 'edit-card';
    rewardCard.style.padding = '12px 14px';

    const badges = document.createElement('div');
    badges.className = 'reward-badges';
    if (q.rewards.gold)   badges.innerHTML += `<span class="reward-badge">💰 ${q.rewards.gold} gold</span>`;
    (q.rewards.cards  ?? []).forEach(c  => badges.innerHTML += `<span class="reward-badge">🃏 ${c}</span>`);
    (q.rewards.items  ?? []).forEach(i  => badges.innerHTML += `<span class="reward-badge">📦 ${i}</span>`);
    (q.rewards.unlockLocations ?? []).forEach(l => badges.innerHTML += `<span class="reward-badge">📍 ${l}</span>`);

    rewardCard.appendChild(badges);
    body.appendChild(rewardCard);
  }
}

// ─────────────────────────────────────────────────────────────────
// DOM helpers
// ─────────────────────────────────────────────────────────────────
function makeEditCard({ label, title, isDirty }) {
  const card = document.createElement('div');
  card.className = 'edit-card' + (isDirty ? ' modified' : '');

  const hdr = document.createElement('div');
  hdr.className = 'card-hdr';
  hdr.innerHTML = `
    <span class="card-hdr-label">${label}</span>
    <span class="card-hdr-title">${title}</span>
    <span class="card-hdr-badge">modified</span>
    <span class="card-toggle">▼</span>
  `;
  hdr.addEventListener('click', () => card.classList.toggle('collapsed'));
  card.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'card-body';
  card.appendChild(body);

  return card;
}

function makeField({ label, value, multiline, tall = false, onChange }) {
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const lbl = document.createElement('label');
  lbl.className = 'field-lbl';
  lbl.textContent = label;
  wrap.appendChild(lbl);

  const el = multiline ? document.createElement('textarea') : document.createElement('input');
  el.className = multiline ? `field-ta${tall ? ' tall' : ''}` : 'field-input';
  if (!multiline) el.type = 'text';
  el.value = value;
  el.addEventListener('input', () => { el.classList.add('changed'); onChange(el.value); });

  VoiceInput.wrap(el);  // wraps el in .field-ctrl and appends mic button

  return wrap;
}

// ─────────────────────────────────────────────────────────────────
// Dirty tracking
// ─────────────────────────────────────────────────────────────────
function markDirty(section, key, card) {
  dirty[section].add(key);
  card?.classList.add('modified');
  refreshSidebarState();
}

// ─────────────────────────────────────────────────────────────────
// Save / Load / Export
// ─────────────────────────────────────────────────────────────────
function buildStoryPayload() {
  const out = {};
  dirty.story.forEach(k => {
    const [chapterId] = k.split(':');
    if (!out[chapterId]) out[chapterId] = { scenes: {} };
    const ch = wk.chapters[chapterId];
    out[chapterId].title    = ch.title;
    out[chapterId].subtitle = ch.subtitle;
    out[chapterId].intro    = ch.intro;
    // scenes
    ch.scenes?.forEach(s => {
      out[chapterId].scenes[s.sceneId] = { title: s.title, text: s.text };
    });
  });
  return out;
}

function buildNpcPayload() {
  const out = {};
  dirty.npc.forEach(k => {
    const [npcId, nodeId] = k.split('::');
    if (!out[npcId]) out[npcId] = { nodes: {} };
    const node = wk.dialogues[npcId].nodes[nodeId];
    out[npcId].nodes[nodeId] = {
      speaker:  node.speaker,
      text:     node.text,
      disabled: node.disabled,
      choices:  (node.choices ?? []).map(c => {
        const co = { label: c.label, result: c.result };
        if (c.requires !== undefined) co.requires = c.requires;
        if (c.effects  !== undefined) co.effects  = c.effects;
        if (c.next     !== undefined) co.next     = c.next;
        return co;
      }),
    };
  });
  return out;
}

function buildQuestPayload() {
  const out = {};
  dirty.quests.forEach(k => {
    const [questId] = k.split(':');
    if (!out[questId]) out[questId] = { objectives: {} };
    const q = wk.quests[questId];
    out[questId].title       = q.title;
    out[questId].description = q.description;
    q.objectives?.forEach(obj => {
      out[questId].objectives[obj.id] = { description: obj.description };
    });
  });
  return out;
}

function saveAll() {
  if (dirty.story.size)  saveRaw(KEYS.story,  buildStoryPayload());
  if (dirty.npc.size)    saveRaw(KEYS.npc,    buildNpcPayload());
  if (dirty.quests.size) saveRaw(KEYS.quests, buildQuestPayload());
}

function refreshNpc() {
  // Re-clone NPC source data
  Object.entries(DIALOGUES).forEach(([id, d]) => { wk.dialogues[id] = JSON.parse(JSON.stringify(d)); });
  dirty.npc.clear();

  // Re-apply any saved NPC overrides
  mergeNpcOverrides(loadRaw(KEYS.npc));

  buildSidebar();

  // Re-render current panel if an NPC is open
  if (activeKey) {
    const [type, id] = activeKey.split(':');
    if (type === 'npc') selectItem(activeKey, type, id);
  }
}

function resetAll() {
  Object.values(KEYS).forEach(k => localStorage.removeItem(k));
  dirty.story.clear(); dirty.npc.clear(); dirty.quests.clear();

  // Re-clone originals
  CHAPTERS.forEach(ch => { wk.chapters[ch.chapterId] = JSON.parse(JSON.stringify(ch)); });
  Object.entries(DIALOGUES).forEach(([id, d]) => { wk.dialogues[id] = JSON.parse(JSON.stringify(d)); });
  QUESTS.forEach(q => { wk.quests[q.questId] = JSON.parse(JSON.stringify(q)); });

  refreshSidebarState();
  if (activeKey) {
    const [type, id] = activeKey.split(':');
    selectItem(activeKey, type, id);
  }
}

function exportAll() {
  const payload = {
    story:  buildStoryPayload(),
    npc:    buildNpcPayload(),
    quests: buildQuestPayload(),
  };
  const content = `// Conjuring Masters — Story Overrides Export\n// ${new Date().toISOString()}\nexport const OVERRIDES = ${JSON.stringify(payload, null, 2)};\n`;
  const blob = new Blob([content], { type: 'text/javascript' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'story_overrides.js' });
  a.click();
  URL.revokeObjectURL(url);
}

function saveRaw(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function loadRaw(key) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; }
  catch { return null; }
}

// Topbar

function bindTopbar() {
  document.getElementById('btn-save').addEventListener('click', () => {
    const total = dirty.story.size + dirty.npc.size + dirty.quests.size;
    if (!total) { showStatus('No changes to save.', 'warn'); return; }
    saveAll();
    showStatus(`Saved ${total} change(s). Reload the game to apply.`, 'ok');
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset ALL text to the original script? This cannot be undone.')) return;
    resetAll();
    showStatus('All text reset to default.', 'warn');
  });

  document.getElementById('btn-refresh').addEventListener('click', () => {
    refreshNpc();
    showStatus('NPC dialogue reloaded from source + saved overrides.', 'ok');
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    exportAll();
    showStatus('Exported story_overrides.js', 'ok');
  });

  document.getElementById('search-input').addEventListener('input', () => {
    if (!activeKey) return;
    const [type, id] = activeKey.split(':');
    if (type === 'story')  renderChapter(id);
    if (type === 'npc')    renderNpc(id);
  });
}

// ─────────────────────────────────────────────────────────────────
// MAP EDITOR
// ─────────────────────────────────────────────────────────────────
const MAP_KEY = 'sca_map_overrides';

const mapWk = { locations: [], npcs: [] };
let mapNpcPos = {};        // key = "locId:areaId:npcId" → { left, bottom }
let mapSel   = { locationId: null, areaId: null };
let mapSelObj = null;      // { type, id }
let _drag    = null;       // active drag state
let mapIsDirty = false;

function mapInit() {
  mapWk.locations = JSON.parse(JSON.stringify(LOCATIONS));
  mapWk.npcs      = JSON.parse(JSON.stringify(NPCS));

  const saved = loadRaw(MAP_KEY);
  if (saved) {
    (saved.locations ?? []).forEach(locOv => {
      const loc = mapWk.locations.find(l => l.id === locOv.id);
      if (!loc) return;
      (locOv.areas ?? []).forEach(aOv => {
        const area = loc.areas.find(a => a.id === aOv.id);
        if (!area) return;
        ['doors','treasures','barrels','objects'].forEach(k => {
          if (aOv[k]) area[k] = JSON.parse(JSON.stringify(aOv[k]));
        });
      });
    });
    mapNpcPos = saved.npcPositions ?? {};
    if (saved.npcs) {
      saved.npcs.forEach(n => {
        const npc = mapWk.npcs.find(x => x.id === n.id);
        if (npc) Object.assign(npc, n);
      });
    }
  }

  buildMapSidebar();

  document.getElementById('map-btn-save').addEventListener('click', () => {
    mapSave();
    showStatus('Map changes saved.', 'ok');
    mapIsDirty = false;
  });

  // Global drag handlers
  window.addEventListener('mousemove', mapOnMouseMove);
  window.addEventListener('mouseup',   mapOnMouseUp);

  // Resize: re-fit preview
  window.addEventListener('resize', mapRefreshPreviewSize);
}

function mapSave() {
  const payload = {
    locations: mapWk.locations.map(loc => ({
      id: loc.id,
      areas: loc.areas.map(area => ({
        id: area.id,
        doors:     area.doors     ?? [],
        treasures: area.treasures ?? [],
        barrels:   area.barrels   ?? [],
        objects:   area.objects   ?? [],
      })),
    })),
    npcPositions: mapNpcPos,
    npcs: mapWk.npcs.map(n => ({
      id: n.id, name: n.name, description: n.description, location: n.location,
    })),
  };
  saveRaw(MAP_KEY, payload);
}

// ── Sidebar ───────────────────────────────────────────────────────
function buildMapSidebar() {
  const list = document.getElementById('map-loc-list');
  list.innerHTML = '';
  mapWk.locations.forEach(loc => {
    const item = document.createElement('div');
    item.className = 'map-loc-item';

    const hdr = document.createElement('div');
    hdr.className = 'map-loc-hdr';
    hdr.innerHTML = `
      <span class="map-loc-icon">${loc.icon ?? '📍'}</span>
      <span class="map-loc-name">${loc.name}</span>
      ${loc.tag ? `<span class="map-loc-tag">${loc.tag}</span>` : ''}
      <span class="map-loc-arrow">▼</span>
    `;
    hdr.addEventListener('click', () => item.classList.toggle('collapsed'));
    item.appendChild(hdr);

    const areasDiv = document.createElement('div');
    areasDiv.className = 'map-areas';
    (loc.areas ?? []).forEach(area => {
      const aEl = document.createElement('div');
      aEl.className = 'map-area-item';
      aEl.dataset.locId  = loc.id;

function selectMapArea(locationId, areaId) {
  mapSel    = { locationId, areaId };
  mapSelObj = null;

  document.querySelectorAll('.map-area-item').forEach(el => {
    el.classList.toggle('active', el.dataset.locId === locationId && el.dataset.areaId === areaId);
  });

  const loc  = mapWk.locations.find(l => l.id === locationId);
  const area = loc?.areas.find(a => a.id === areaId);
  if (!loc || !area) return;

  document.getElementById('map-area-hdr').classList.add('visible');
  document.getElementById('map-ah-icon').textContent  = area.bgIcon ?? '📍';
  document.getElementById('map-ah-title').textContent = area.name;
  document.getElementById('map-ah-sub').textContent   = `${loc.name} · ${area.description ?? ''}`;

  document.getElementById('map-content').style.display = 'flex';
  document.getElementById('map-empty').style.display   = 'none';

  renderMapObjList(loc, area);
  renderMapPreview(loc, area);
}

// ── Position helpers ──────────────────────────────────────────────
function posToXY(pos) {
  if (!pos) return { left: 50, bottom: 50 };
  let left = 50, bottom = 50;
  if (pos.left   !== undefined) left   = parseFloat(pos.left);
  else if (pos.right !== undefined) left = 100 - parseFloat(pos.right);
  if (pos.bottom !== undefined) bottom = parseFloat(pos.bottom);
  else if (pos.top   !== undefined) bottom = 100 - parseFloat(pos.top);
  return { left: Math.max(2, Math.min(98, left)), bottom: Math.max(2, Math.min(98, bottom)) };
}
function xyToPos(l, b) {
  return { left: `${l.toFixed(1)}%`, bottom: `${b.toFixed(1)}%` };
}
function getNpcPos(locId, areaId, npcId) {
  return mapNpcPos[`${locId}:${areaId}:${npcId}`] ?? { left: 50, bottom: 60 };
}
function setNpcPos(locId, areaId, npcId, left, bottom) {
  mapNpcPos[`${locId}:${areaId}:${npcId}`] = { left, bottom };
}

// ── Object list ───────────────────────────────────────────────────
function getGroupedObjects(loc, area) {
  return {
    npcs:      mapWk.npcs.filter(n => n.location === loc.id),
    doors:     area.doors     ?? [],
    treasures: area.treasures ?? [],
    barrels:   area.barrels   ?? [],
    objects:   area.objects   ?? [],
  };
}

function renderMapObjList(loc, area) {
  const listEl = document.getElementById('map-obj-list');
  listEl.innerHTML = '';

  const groups = [
    { key: 'npcs',      icon: '🧙', label: 'NPCs',      canAdd: false },
    { key: 'doors',     icon: '🚪', label: 'Doors',     canAdd: true,
      newObj: () => ({ id: `door_${Date.now()}`, label: 'New Door', targetAreaId: '', position: { left: '50%', bottom: '10%' } }) },
    { key: 'treasures', icon: '💎', label: 'Treasures', canAdd: true,
      newObj: () => ({ id: `treasure_${Date.now()}`, icon: '📦', img: 'assets/images/CardGameArt/ObjectArt/chest1.png', label: 'New Treasure', position: { left: '50%', bottom: '30%' }, loot: { type: 'coin', amount: 10 } }) },
    { key: 'barrels',   icon: '🛢️', label: 'Barrels',   canAdd: true,
      newObj: () => ({ id: `barrel_${Date.now()}`, icon: '🛢️', img: 'assets/images/CardGameArt/ObjectArt/barrel.png', label: 'New Barrel', position: { left: '50%', bottom: '25%' }, loot: { type: 'coin', amount: 10 } }) },
    { key: 'objects',   icon: '🪑', label: 'Objects',   canAdd: true,
      newObj: () => ({ id: `obj_${Date.now()}`, icon: '📦', label: 'New Object', position: { left: '50%', bottom: '40%' }, action: '' }) },
  ];

  const all = getGroupedObjects(loc, area);

  groups.forEach(({ key, icon, label, canAdd, newObj }) => {
    const items = all[key];
    const grp   = document.createElement('div');
    grp.className = 'obj-group';

    const hdrRow = document.createElement('div');
    hdrRow.className = 'obj-group-hdr';
    hdrRow.innerHTML = `<span class="obj-group-title">${icon} ${label}</span><span class="obj-group-count">${items.length}</span>`;

    if (canAdd) {
      const addBtn = document.createElement('button');
      addBtn.className = 'obj-group-add';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', () => {
        if (!area[key]) area[key] = [];
        area[key].push(newObj());
        mapIsDirty = true;
        renderMapObjList(loc, area);
        renderMapPreview(loc, area);
      });
      hdrRow.appendChild(addBtn);
    }
    grp.appendChild(hdrRow);

    if (!items.length) {
      const em = document.createElement('div');
      em.className = 'obj-group-empty';
      em.textContent = 'None';
      grp.appendChild(em);
    }

    items.forEach((obj, idx) => {
      grp.appendChild(buildMapObjCard(obj, key, idx, area, loc));
    });

    listEl.appendChild(grp);
  });
}

function buildMapObjCard(obj, type, idx, area, loc) {
  const card   = document.createElement('div');
  card.className = 'map-obj-card collapsed';
  card.dataset.objType = type;
  card.dataset.objId   = obj.id;

  const isNpc    = type === 'npcs';
  const isSelected = mapSelObj?.type === type && mapSelObj?.id === obj.id;
  if (isSelected) { card.classList.add('selected'); card.classList.remove('collapsed'); }

  const objIcon  = obj.img && (type === 'treasures' || type === 'barrels') ? null : (obj.icon ?? obj.portrait ?? (type === 'doors' ? '🚪' : '📦'));
  const objName  = obj.name ?? obj.label ?? obj.id;
  const pos      = isNpc ? getNpcPos(loc.id, mapSel.areaId, obj.id) : posToXY(obj.position);
  const posLabel = `${Number(pos.left).toFixed(1)}%, ${Number(pos.bottom).toFixed(1)}%`;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'map-obj-card-hdr';

  const iconSpan = document.createElement('span');
  iconSpan.className = 'map-obj-icon';
  if (objIcon === null && obj.img) {
    const thumbEl = document.createElement('img');
    thumbEl.src = obj.img;
    thumbEl.alt = objName;
    thumbEl.style.cssText = 'width:20px;height:auto;vertical-align:middle;display:block;';
    iconSpan.appendChild(thumbEl);
  } else {
    iconSpan.textContent = objIcon;
  }

  const nameSpan = document.createElement('span');
  nameSpan.className = 'map-obj-name';
  nameSpan.textContent = objName;

  const posSpan = document.createElement('span');
  posSpan.className = 'map-obj-pos';
  posSpan.textContent = posLabel;

  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'map-obj-actions';

  if (!isNpc) {
    const dupBtn = document.createElement('button');
    dupBtn.className = 'map-obj-btn dup';
    dupBtn.title = 'Duplicate';
    dupBtn.textContent = '⧉';
    dupBtn.addEventListener('click', e => {
      e.stopPropagation();
      const clone = JSON.parse(JSON.stringify(obj));
      clone.id = `${clone.id}_copy_${Date.now()}`;
      area[type].splice(idx + 1, 0, clone);
      mapIsDirty = true;
      renderMapObjList(loc, area);
      renderMapPreview(loc, area);
    });
    actionsDiv.appendChild(dupBtn);

    const remBtn = document.createElement('button');
    remBtn.className = 'map-obj-btn rem';
    remBtn.title = 'Remove';
    remBtn.textContent = '×';
    remBtn.addEventListener('click', e => {
      e.stopPropagation();
      area[type].splice(idx, 1);
      if (mapSelObj?.type === type && mapSelObj?.id === obj.id) mapSelObj = null;
      mapIsDirty = true;
      renderMapObjList(loc, area);
      renderMapPreview(loc, area);
    });
    actionsDiv.appendChild(remBtn);
  }

  hdr.appendChild(iconSpan);
  hdr.appendChild(nameSpan);
  hdr.appendChild(posSpan);
  hdr.appendChild(actionsDiv);

  hdr.addEventListener('click', () => {
    const wasSelected = mapSelObj?.type === type && mapSelObj?.id === obj.id;
    mapSelObj = wasSelected ? null : { type, id: obj.id };
    card.classList.toggle('collapsed');
    syncMapSelection();
  });

  card.appendChild(hdr);

  // Body: editable fields
  const body = document.createElement('div');
  body.className = 'map-obj-body';

  const addField = (lbl, val, onChange) => {
    const row = document.createElement('div');
    row.className = 'mf-row';
    const l = document.createElement('span');
    l.className = 'mf-lbl'; l.textContent = lbl;
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'mf-inp'; inp.value = val;
    inp.addEventListener('input', () => { onChange(inp.value); mapIsDirty = true; });
    row.appendChild(l); row.appendChild(inp);
    body.appendChild(row);
    return inp;
  };

  if (isNpc) {
    addField('Name',        obj.name        ?? '', v => { obj.name = v; nameSpan.textContent = v; syncMapPreviewLabel(type, obj.id, v); });
    addField('Location',    obj.location    ?? '', v => { obj.location = v; });
    addField('Description', obj.description ?? '', v => { obj.description = v; });
  } else if (type === 'doors') {
    addField('Label',           obj.label           ?? '', v => { obj.label = v; nameSpan.textContent = v; syncMapPreviewLabel(type, obj.id, v); });
    addField('Target Area',     obj.targetAreaId    ?? '', v => { obj.targetAreaId = v; });
    addField('Target Location', obj.targetLocationId ?? '', v => { obj.targetLocationId = v; });
  } else if (type === 'treasures' || type === 'barrels') {
    addField('Label',      obj.label      ?? '', v => { obj.label = v; nameSpan.textContent = v; syncMapPreviewLabel(type, obj.id, v); });
    addField('Image',      obj.img        ?? '', v => { obj.img = v; syncMapPreviewImg(type, obj.id, v); });
    addField('Icon',       obj.icon       ?? '', v => { obj.icon = v; if (!obj.img) { iconSpan.textContent = v; syncMapPreviewIcon(type, obj.id, v); } });
    addField('Loot Type',  obj.loot?.type ?? '', v => { if (!obj.loot) obj.loot = {}; obj.loot.type = v; });
    addField('Loot Amt',   String(obj.loot?.amount ?? ''), v => { if (!obj.loot) obj.loot = {}; obj.loot.amount = parseInt(v) || 0; });
  } else if (type === 'objects') {
    addField('Icon',   obj.icon   ?? '', v => { obj.icon = v; iconSpan.textContent = v; syncMapPreviewIcon(type, obj.id, v); });
    addField('Label',  obj.label  ?? '', v => { obj.label = v; nameSpan.textContent = v; syncMapPreviewLabel(type, obj.id, v); });
    addField('Action', obj.action ?? '', v => { obj.action = v; });
  }

  // Position fields with arrow spinners
  const curPos = isNpc ? getNpcPos(loc.id, mapSel.areaId, obj.id) : posToXY(obj.position);

  const addPosField = (lbl, initVal, onCommit) => {
    const row = document.createElement('div');
    row.className = 'mf-row';
    const l = document.createElement('span');
    l.className = 'mf-lbl'; l.textContent = lbl;

    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'mf-inp'; inp.value = initVal;
    inp.addEventListener('input', () => { onCommit(inp.value); mapIsDirty = true; });

    const arrowsWrap = document.createElement('div');
    arrowsWrap.className = 'mf-arrows';

    const makeArrow = (delta) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mf-arrow';
      btn.textContent = delta > 0 ? '▲' : '▼';
      let _timer, _interval;
      const act = () => {
        const cur = parseFloat(inp.value) || 0;
        const next = Math.max(0, Math.min(100, +(cur + delta).toFixed(1)));
        inp.value = next.toFixed(1);
        onCommit(inp.value);
        mapIsDirty = true;
      };
      btn.addEventListener('mousedown', e => {
        e.preventDefault();
        act();
        _timer = setTimeout(() => { _interval = setInterval(act, 50); }, 320);
      });
      const stop = () => { clearTimeout(_timer); clearInterval(_interval); };
      btn.addEventListener('mouseup',    stop);
      btn.addEventListener('mouseleave', stop);
      return btn;
    };

    arrowsWrap.appendChild(makeArrow(0.5));
    arrowsWrap.appendChild(makeArrow(-0.5));

    row.appendChild(l);
    row.appendChild(inp);
    row.appendChild(arrowsWrap);
    body.appendChild(row);
    return inp;
  };

  const leftInp   = addPosField('Left %',   Number(curPos.left).toFixed(1), v => {
    const n = parseFloat(v); if (isNaN(n)) return;
    updateMapObjPos(type, obj, loc.id, mapSel.areaId, n, null);
    posSpan.textContent = `${n.toFixed(1)}%, ${Number(curPos.bottom).toFixed(1)}%`;
    renderMapPreview(loc, area);
  });
  const bottomInp = addPosField('Bottom %', Number(curPos.bottom).toFixed(1), v => {
    const n = parseFloat(v); if (isNaN(n)) return;
    updateMapObjPos(type, obj, loc.id, mapSel.areaId, null, n);
    posSpan.textContent = `${Number(curPos.left).toFixed(1)}%, ${n.toFixed(1)}%`;
    renderMapPreview(loc, area);
  });
  // Keep inputs in sync when dragged
  card._leftInp   = leftInp;
  card._bottomInp = bottomInp;
  card._posSpan   = posSpan;

  card.appendChild(body);
  return card;
}

function updateMapObjPos(type, obj, locId, areaId, newLeft, newBottom) {
  if (type === 'npcs') {
    const cur = getNpcPos(locId, areaId, obj.id);
    setNpcPos(locId, areaId, obj.id,
      newLeft  !== null ? newLeft  : cur.left,
      newBottom !== null ? newBottom : cur.bottom);
  } else {
    const cur  = posToXY(obj.position);
    const left = newLeft   !== null ? newLeft   : cur.left;
    const bot  = newBottom !== null ? newBottom : cur.bottom;
    obj.position = xyToPos(left, bot);
  }
  mapIsDirty = true;
}

function syncMapSelection() {
  document.querySelectorAll('.map-obj-card').forEach(c => {
    c.classList.toggle('selected', mapSelObj && c.dataset.objId === mapSelObj.id && c.dataset.objType === mapSelObj.type);
  });
  document.querySelectorAll('.map-token').forEach(t => {
    t.classList.toggle('selected', mapSelObj && t.dataset.objId === mapSelObj.id && t.dataset.objType === mapSelObj.type);
  });
}

function syncMapPreviewLabel(type, id, val) {
  const t = document.querySelector(`.map-token[data-obj-type="${type}"][data-obj-id="${id}"] .map-token-lbl`);
  if (t) t.textContent = val;
}
function syncMapPreviewIcon(type, id, val) {
  const iconEl = document.querySelector(`.map-token[data-obj-type="${type}"][data-obj-id="${id}"] .map-token-icon`);
  if (!iconEl) return;
  // Only update text if no image is present
  if (!iconEl.querySelector('img')) iconEl.textContent = val;
}
function syncMapPreviewImg(type, id, src) {
  const iconEl = document.querySelector(`.map-token[data-obj-type="${type}"][data-obj-id="${id}"] .map-token-icon`);
  if (!iconEl) return;
  let imgEl = iconEl.querySelector('img');
  if (src) {
    if (!imgEl) {
      imgEl = document.createElement('img');
      imgEl.style.cssText = 'width:28px;height:auto;display:block;pointer-events:none;';
      iconEl.textContent = '';
      iconEl.appendChild(imgEl);
    }
    imgEl.src = src;
  } else {
    if (imgEl) imgEl.remove();
  }
}

// ── Preview ───────────────────────────────────────────────────────
function renderMapPreview(loc, area) {
  const preview = document.getElementById('map-preview');

  // Size preview to fill panel at 16:9
  const panel = document.getElementById('map-preview-panel');
  const pw = panel.clientWidth  - 28;
  const ph = panel.clientHeight - 56;  // leave room for hint
  let w, h;
  if (pw / ph > 16 / 9) { h = ph; w = h * (16 / 9); }
  else                   { w = pw; h = w * (9 / 16); }
  preview.style.width  = `${Math.max(200, w)}px`;
  preview.style.height = `${Math.max(112, h)}px`;

  preview.innerHTML = '';

  // ── Overlay guides — mirror the game's sidebar + header to keep positions accurate ──
  // Sidebar: game sidebar is 230px wide; at 1920px reference ≈ 12% of viewport width
  const sidebarGuide = document.createElement('div');
  sidebarGuide.className = 'preview-sidebar-guide';
  const sidebarLbl = document.createElement('span');
  sidebarLbl.className = 'preview-sidebar-label';
  sidebarLbl.textContent = 'Sidebar';
  sidebarGuide.appendChild(sidebarLbl);
  preview.appendChild(sidebarGuide);

  // Header bar: game header is 48px; at 1080px reference ≈ 4.4% of viewport height
  const headerGuide = document.createElement('div');
  headerGuide.className = 'preview-header-guide';
  preview.appendChild(headerGuide);

  // Background — mirror SceneScreen logic: area.bgImage ?? location.bgImage → else bgIcon
  const bgImage = area.bgImage ?? loc.bgImage;
  const bgIcon  = area.bgIcon  ?? loc.bgIcon ?? loc.icon ?? '🏛️';
  if (bgImage) {
    preview.style.backgroundImage    = `url('${bgImage}')`;
    preview.style.backgroundSize     = 'cover';
    preview.style.backgroundPosition = 'center';
  } else {
    preview.style.backgroundImage = '';
    const bg = document.createElement('div');
    bg.className = 'preview-bg-icon';
    bg.textContent = bgIcon;
    preview.appendChild(bg);
  }

  // Tokens
  const grouped = getGroupedObjects(loc, area);
  const typeIconFn = {
    npcs:      o => o.portrait ?? '🧙',
    doors:     o => '🚪',
    treasures: o => o.icon ?? '📦',
    barrels:   o => o.icon ?? '🛢️',
    objects:   o => o.icon ?? '📦',
  };
  const typeLabelFn = { npcs: o => o.name ?? o.id, doors: o => o.label ?? o.id, treasures: o => o.label ?? o.id, barrels: o => o.label ?? o.id, objects: o => o.label ?? o.id };

  Object.entries(grouped).forEach(([type, items]) => {
    items.forEach(obj => {
      const pos = type === 'npcs'
        ? getNpcPos(loc.id, mapSel.areaId, obj.id)
        : posToXY(obj.position);

      const token = document.createElement('div');
      token.className = 'map-token';
      token.dataset.objType = type;
      token.dataset.objId   = obj.id;
      token.style.left   = `${pos.left}%`;
      token.style.bottom = `${pos.bottom}%`;

      if (mapSelObj?.type === type && mapSelObj?.id === obj.id) token.classList.add('selected');

      const iconDiv = document.createElement('div');
      iconDiv.className = 'map-token-icon';
      if (obj.img && (type === 'treasures' || type === 'barrels')) {
        const imgEl = document.createElement('img');
        imgEl.src = obj.img;
        imgEl.alt = obj.label ?? type;
        imgEl.style.cssText = 'width:28px;height:auto;display:block;pointer-events:none;';
        iconDiv.appendChild(imgEl);
      } else {
        iconDiv.textContent = typeIconFn[type](obj);
      }

      const lblDiv = document.createElement('div');
      lblDiv.className = 'map-token-lbl';
      lblDiv.textContent = typeLabelFn[type](obj);

      // Anchor dot — lowest element in the token, sits exactly at (left%, bottom%)
      const dotDiv = document.createElement('div');
      dotDiv.className = 'map-token-dot';

      token.appendChild(iconDiv);
      token.appendChild(lblDiv);
      token.appendChild(dotDiv);

      token.addEventListener('mousedown', e => {
        e.preventDefault();
        _drag = {
          token, obj, type, loc, area,
          startLeft: pos.left, startBottom: pos.bottom, moved: false,
        };
        token.classList.add('dragging');
        // Select in list
        mapSelObj = { type, id: obj.id };
        syncMapSelection();
        // Open card
        const card = document.querySelector(`.map-obj-card[data-obj-type="${type}"][data-obj-id="${obj.id}"]`);
        if (card) card.classList.remove('collapsed');
      });

      preview.appendChild(token);
    });
  });
}

function mapRefreshPreviewSize() {
  if (!mapSel.locationId) return;
  const loc  = mapWk.locations.find(l => l.id === mapSel.locationId);
  const area = loc?.areas.find(a => a.id === mapSel.areaId);
  if (loc && area) renderMapPreview(loc, area);
}

function mapOnMouseMove(e) {
  if (!_drag) return;
  const preview = document.getElementById('map-preview');
  if (!preview) return;
  const rect = preview.getBoundingClientRect();
  const left   = Math.max(2, Math.min(98, ((e.clientX - rect.left)  / rect.width)  * 100));
  const bottom = Math.max(2, Math.min(98, (1 - (e.clientY - rect.top) / rect.height) * 100));
  _drag.token.style.left   = `${left}%`;
  _drag.token.style.bottom = `${bottom}%`;
  _drag.curLeft   = left;
  _drag.curBottom = bottom;
  _drag.moved     = true;
}

function mapOnMouseUp() {
  if (!_drag) return;
  if (_drag.moved) {
    const { obj, type, loc, area } = _drag;
    const l = _drag.curLeft   ?? _drag.startLeft;
    const b = _drag.curBottom ?? _drag.startBottom;
    updateMapObjPos(type, obj, loc.id, mapSel.areaId, l, b);

    // Update list card position display
    const card = document.querySelector(`.map-obj-card[data-obj-type="${type}"][data-obj-id="${obj.id}"]`);
    if (card) {
      if (card._posSpan)   card._posSpan.textContent = `${l.toFixed(1)}%, ${b.toFixed(1)}%`;
      if (card._leftInp)   card._leftInp.value   = l.toFixed(1);
      if (card._bottomInp) card._bottomInp.value = b.toFixed(1);
    }
  }
  _drag.token.classList.remove('dragging');
  _drag = null;
}

// ─────────────────────────────────────────────────────────────────
init();
</script>
