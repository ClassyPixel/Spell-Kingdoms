<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>Conjuring Masters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Portrait-mode overlay (shown via CSS on touch devices in portrait) -->
  <div id="rotate-overlay" aria-hidden="true">
    <div class="rotate-content">
      <div class="rotate-icon">📱</div>
      <div class="rotate-title">Rotate Your Device</div>
      <div class="rotate-sub">Conjuring Masters plays best in landscape mode</div>
    </div>
  </div>

  <div id="game-root">
    <div id="screen-container"></div>

    <div id="loading-screen">
      <div class="loading-content">
        <img src="assets/images/CardGameArt/summoncircle1.png" alt="" class="loading-circle">
        <p class="loading-sub">Loading</p>
        <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
