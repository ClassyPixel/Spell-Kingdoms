  <rect x="44" y="236" width="112" height="14" rx="5" fill="#0a0620"/>
  <rect x="54"  y="233" width="22" height="26" rx="4" fill="#1e0f3a"/>
  <rect x="124" y="233" width="22" height="26" rx="4" fill="#1e0f3a"/>
  <line x1="65"  y1="233" x2="65"  y2="259" stroke="#2a1852" stroke-width="1.5"/>
  <line x1="135" y1="233" x2="135" y2="259" stroke="#2a1852" stroke-width="1.5"/>
  <!-- left arm -->
