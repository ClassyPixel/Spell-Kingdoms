  <!-- collar detail -->
  <path d="M82,152 L100,180 L118,152 Z" fill="#2a1852"/>
  <!-- head -->
  <ellipse cx="100" cy="84" rx="48" ry="52" fill="#e0c8c0"/>
  <!-- eyebrows (one arched - mysterious) -->
  <path d="M74,76 Q83,69 92,73"  stroke="#5a28b0" stroke-width="3"   fill="none" stroke-linecap="round"/>
  <path d="M108,72 Q118,67 126,74" stroke="#5a28b0" stroke-width="3"   fill="none" stroke-linecap="round"/>
  <!-- eyes (teal) -->
  <ellipse cx="83"  cy="86" rx="9" ry="10" fill="white"/>
  <ellipse cx="117" cy="86" rx="9" ry="10" fill="white"/>
  <ellipse cx="83"  cy="87" rx="6.5" ry="7.5" fill="#208a70"/>
  <ellipse cx="117" cy="87" rx="6.5" ry="7.5" fill="#208a70"/>
  <ellipse cx="83"  cy="88" rx="3"  ry="3.5" fill="#0a1a14"/>
  <ellipse cx="117" cy="88" rx="3"  ry="3.5" fill="#0a1a14"/>
  <circle cx="86"  cy="84" r="2" fill="white"/>
  <circle cx="120" cy="84" r="2" fill="white"/>
  <!-- nose -->
  <circle cx="100" cy="101" r="2" fill="#c8a898"/>
  <!-- slight smirk -->
  <path d="M89,113 Q100,121 112,116" stroke="#b07a7a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
