  <rect x="178" y="260" width="10" height="24" rx="5" fill="#1a3030"/>
  <rect x="178" y="260" width="10" height="24" rx="5" fill="none" stroke="#40b898" stroke-width="1.5"/>
  <ellipse cx="183" cy="268" rx="4" ry="5" fill="#30c8a8" fill-opacity="0.7"/>
